<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat — RAG Assistant</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <span class="logo-text">RAG AI</span>
      </div>

      <nav class="sidebar-nav">
        <a href="/" class="nav-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Home
        </a>
        <a href="/chat" class="nav-item active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          New Chat
        </a>
      </nav>

      <div class="sidebar-section-label">History</div>
      <div class="history-list" id="history-list">
        <div class="history-empty">No conversations yet</div>
      </div>

      <div class="sidebar-footer">
        <div class="user-avatar">S</div>
        <div class="user-info">
          <span class="user-name">User</span>
          <span class="user-sub">RAG Assistant</span>
        </div>
      </div>
    </aside>

    <!-- Chat area -->
    <main class="main-content chat-layout">
      <!-- Top bar -->
      <header class="chat-topbar">
        <div class="chat-topbar-left">
          <span class="chat-title" id="chat-title">New Conversation</span>
        </div>
        <div class="chat-topbar-right">
          <label class="topbar-btn" title="Upload files" for="file-upload-chat">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            <input type="file" id="file-upload-chat" accept=".pdf,.txt" multiple hidden />
          </label>
          <div class="file-badge-area" id="file-badge-area"></div>
        </div>
      </header>

      <!-- Messages -->
      <div class="messages-area" id="messages-area">
        <div class="messages-inner" id="messages-inner">
          <!-- messages injected here -->
        </div>
      </div>

      <!-- Input bar -->
      <div class="chat-input-wrap">
        <div class="chat-input-card">
          <textarea
            class="chat-textarea"
            id="chat-input"
            placeholder="Ask something about your documents…"
            rows="1"
          ></textarea>
          <div class="input-actions">
            <div class="input-left-actions">
              <label class="action-btn" title="Attach file" for="file-attach-inline">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                <input type="file" id="file-attach-inline" accept=".pdf,.txt" multiple hidden />
              </label>
            </div>
            <button class="send-btn" id="send-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
          <p class="input-disclaimer">AI may generate inaccurate information, verify critical outputs</p>
        </div>
      </div>
    </main>
  </div>

  <script src="/static/js/ui.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
